<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Sakuuu :D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap'); 
        @import url('https://fonts.googleapis.com/css?family=Shadows+Into+Light&display=swap');
        body {
            background-image: url(files/bgs22.jpg);
            background-repeat: no-repeat;
            background-size: 150%;
            background-color: mistyrose;
        }
        :root {
        --banner-bg: #ffb7c5;
        --banner-txt: black;

        --message-bg: #F1EDE9;
        --message-line: #94ACD4;
        --message-txt: #333333;

        --font-banner: 'Abril Fatface', cursive;
        --font-text: 'Shadows Into Light', cursive;

        --space: 16px;
        --space-xsm: 4px;
        --space-sm: 8px;
        --space-lg: 24px;
        --space-xlg: 48px;
        }

        body {
        min-height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        overflow-x: hidden;
        }

        .bday-card {
        max-width: 420px;
        height: 100%;
        padding-top: var(--space-lg);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        position: relative;
        }

        .bday-pic {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 280px;
        height: 240px;
        padding: var(--space-sm) var(--space-sm) var(--space-xlg);
        background: white;
        border-radius: 4px;
        box-shadow: var(--space-xsm) var(--space-xsm) 15px rgba(0,0,0, .15);

        transform: rotate(5deg) translate(20px, 45px);
        }

        .bday-pic img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        }

        .bday-decor--container {
        position: relative;
        }

        .bday-banner {
        display: flex;
        flex-direction: column;
        align-items: baseline;
        font-size: 42px;
        z-index: 1;

        color: var(--banner-txt);
        font-family: var(--font-banner);
        text-transform: uppercase;
        transform: rotate(-5deg);
        gap: var(--space-sm) 0;
        }

        .bday-banner span {
        background: var(--banner-bg);
        padding: var(--space) var(--space-lg);
        flex-grow: 0;
        }

        .bday-banner span:nth-child(2) {
        margin-left: var(--space-lg);
        }


        .bday-message {
        max-width: 80%;
        padding: 35px var(--space);
        font-family: var(--font-text);
        font-size: 18px;
        line-height: 32px;
        color: var(--message-txt);
        background-color: var(--message-bg);
        }

        .bday-message--paper {
        background: repeating-linear-gradient(var(--message-bg), var(--message-bg) 31px, var(--message-line) 31px, var(--message-line) 32px);
        box-shadow: var(--space-xsm) var(--space-xsm) 15px rgba(0,0,0, .15);
        }

        .bday-message--block-right {
        position: relative;
        }

        .bday-message--block-right::before {
        content: "";
        width: 100vw;
        height: 100%;
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        background: var(--paper);
        z-index: -1;
        }

        .bday-message--block-left {
        position: relative;
        }

        .bday-message--block-left::before {
        content: "";
        width: 100vw;
        height: 100%;
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        background: var(--paper);
        z-index: -1;
        }


        .bday-decor {
        font-size: 96px;
        }

        .bday-decor--top-right { 
        position: absolute;
        bottom: -70px;
        right: -20px;
        }

        .bday-decor--top-left {
        position: absolute;
        bottom: 0px;
        left: -25px;
        }

        .bday-decor--bottom-right {
        position: absolute; 
        right: 20px;
        }


        .zoom-left-in-out {
        animation-name: zoom-left-in-out;
        animation-duration: 1.75s;
        animation-iteration-count: infinite;
        transform-origin: left bottom;
        }

        @keyframes zoom-left-in-out {
        0%, 100% {
            transform: scale(0.95) rotate(2deg);
        }

        50% {
            transform: scale(1) rotate(-2deg);
        }
        }

        .pulse {
        animation-name: pulse;
        animation-duration: 1.3s;
        animation-iteration-count: infinite;
        }

        @keyframes pulse {
        0%, 100% {
            transform: scale(0.9);
        }

        50% {
            transform: scale(1);
        }
        }

        .float {
        animation-name: float;
        animation-duration: 1.9s;
        animation-iteration-count: infinite;
        }

        @keyframes float {
        0%, 100% {
            transform: translateY(0px);
        }
        50% {
            transform: translateY(10px);
        }
        }

        .spin {
        animation-name: spin;
        animation-duration: 3s;
        animation-iteration-count: infinite;
        animation-timing-function: linear; 
        }

        @keyframes spin {
        from {
            transform: rotate(0);
        }
        to {
            transform: rotate(360deg);
        }
        }
    </style>
</head>
<body>
    <div class="bday-card">
  
        <div class="bday-decor--container">
      
          <div class="bday-pic "> 
            <img src="files/raiden.jpg">
          </div>
      
          <p class="bday-decor bday-decor--top-right float">🎈</p>
          <p class="bday-decor bday-decor--top-left spin">🌼</p>
      
        </div> 
      
      
        <h1 class="bday-banner">
          <span>Happy</span> <span>Birthday</span> <span>Sakuu</span>
        </h1> 
      
        <div class="bday-message bday-message--paper">
          <p>another year another birthday edit, this year a lil website xd makes it more fresh than an edit no? anyway i hope this year will be easy and smooth for ya <br> Neo</p> 
          <p class="bday-decor bday-decor--bottom-right zoom-left-in-out">🎉</p>
        </div>
      
      </div>
      <img src="files/neow.png" style="position: fixed; right: 0px; bottom: 0px; width: 6em;margin-bottom: 0px;">
      <img src="files/dorothy.png" style="position: fixed; left: 0px; bottom: 0px; width: 10em;margin-bottom: 0px;">
</body>
</html>
